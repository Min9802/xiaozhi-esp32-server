<!DOCTYPE html>
<html lang="vi-VN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang kiểm tra máy chủ Xiaozhi</title>
    <link rel="stylesheet" href="test_page.css">
    <style>
        #fileProtocolWarning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        #fileProtocolWarning h2 {
            color: #ff4d4d;
            margin-bottom: 20px;
        }

        #fileProtocolWarning pre {
            background-color: green;
            font-size: 18px;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            overflow-x: auto;
            margin: 15px 0;
        }

        #fileProtocolWarning button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px 2px;
            cursor: pointer;
            border-radius: 4px;
        }

        #fileProtocolWarning button:hover {
            background-color: #45a049;
        }
    </style>
    <script>
        // Phát hiện xem có đang sử dụng giao thức file:// để mở không
        if (window.location.protocol === 'file:') {
            document.addEventListener('DOMContentLoaded', function () {
                // Tạo hộp cảnh báo
                const warningDiv = document.createElement('div');
                warningDiv.id = 'fileProtocolWarning';
                warningDiv.innerHTML = `
                    <h2>⚠️ Cảnh báo: Vui lòng sử dụng máy chủ HTTP để mở trang này</h2>
                    <p>Bạn hiện đang sử dụng cách mở tệp cục bộ (giao thức file://), điều này có thể gây ra lỗi chức năng trang.</p>
                    <p>Bạn có thể sử dụng ánh xạ nginx để khởi động trang kiểm tra, hoặc theo các bước sau để sử dụng python khởi động dịch vụ http kiểm tra:</p>
                    <ol>
                        <li>Mở terminal dòng lệnh</li>
                        <li>Chuyển đến thư mục xiaozhi-server/test</li>
                        <li>Thực thi lệnh sau để khởi động máy chủ HTTP:</li>
                    </ol>
                    <pre>python -m http.server 8006</pre>
                    <p>Sau đó truy cập trong trình duyệt: <strong>http://localhost:8006/test_page.html</strong></p>
                `;
                document.body.appendChild(warningDiv);
            });
        }
    </script>
</head>

<body>

    <!-- Thư viện giải mã Opus -->
    <script src="libopus.js"></script>

    <script type="module">
        import { log } from './js/utils/logger.js';
        import { webSocketConnect } from './js/xiaoZhiConnect.js';
        import { checkOpusLoaded, initOpusEncoder } from './js/opus.js';
        import { addMessage } from './js/document.js'
        import BlockingQueue from './js/utils/BlockingQueue.js'
        import { createStreamingContext } from './js/StreamingContext.js'
        // Danh sách script cần tải - loại bỏ phụ thuộc Opus
        const scriptFiles = [];

        // Trạng thái tải script
        const scriptStatus = {
            loading: 0,
            loaded: 0,
            failed: 0,
            total: scriptFiles.length
        };

        // Biến toàn cục
        let websocket = null;
        let mediaRecorder = null;
        let audioContext = null;
        let analyser = null;
        let audioChunks = [];
        let isRecording = false;
        let visualizerCanvas = document.getElementById('audioVisualizer');
        let visualizerContext = visualizerCanvas.getContext('2d');
        let audioQueue = [];
        let isPlaying = false;
        let opusDecoder = null; // Bộ giải mã Opus
        let visualizationRequest = null; // ID yêu cầu khung hình hoạt ảnh

        // Liên quan đến bộ đệm luồng âm thanh
        let audioBuffers = []; // Dùng để lưu trữ tất cả dữ liệu âm thanh nhận được
        let totalAudioSize = 0; // Theo dõi kích thước âm thanh tích lũy

        let audioBufferQueue = [];     // Lưu trữ các gói âm thanh nhận được
        let isAudioPlaying = false;    // Có đang phát âm thanh không
        const BUFFER_THRESHOLD = 3;    // Ngưỡng số lượng gói đệm, tích lũy ít nhất 3 gói mới bắt đầu phát
        const MIN_AUDIO_DURATION = 0.1; // Độ dài âm thanh tối thiểu (giây), âm thanh ngắn hơn sẽ được hợp nhất
        let streamingContext = null;   // Ngữ cảnh luồng âm thanh
        const SAMPLE_RATE = 16000;     // Tỷ lệ lấy mẫu
        const CHANNELS = 1;            // Số kênh
        const FRAME_SIZE = 960;        // Kích thước khung

        // Phần tử DOM
        const connectButton = document.getElementById('connectButton');
        const serverUrlInput = document.getElementById('serverUrl');
        const connectionStatus = document.getElementById('connectionStatus');
        const messageInput = document.getElementById('messageInput');
        const sendTextButton = document.getElementById('sendTextButton');
        const recordButton = document.getElementById('recordButton');
        const stopButton = document.getElementById('stopButton');
        const conversationDiv = document.getElementById('conversation');
        const logContainer = document.getElementById('logContainer');

        function getAudioContextInstance() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: SAMPLE_RATE,
                    latencyHint: 'interactive'
                });
                log('Tạo ngữ cảnh âm thanh, tỷ lệ lấy mẫu: ' + SAMPLE_RATE + 'Hz', 'debug');
            }
            return audioContext;
        }

        // Khởi tạo bộ hiển thị trực quan
        function initVisualizer() {
            visualizerCanvas.width = visualizerCanvas.clientWidth;
            visualizerCanvas.height = visualizerCanvas.clientHeight;
            visualizerContext.fillStyle = '#fafafa';
            visualizerContext.fillRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
        }

        // Vẽ hiệu ứng hiển thị trực quan âm thanh
        function drawVisualizer(dataArray) {
            visualizationRequest = requestAnimationFrame(() => drawVisualizer(dataArray));

            if (!isRecording) return;

            analyser.getByteFrequencyData(dataArray);

            visualizerContext.fillStyle = '#fafafa';
            visualizerContext.fillRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);

            const barWidth = (visualizerCanvas.width / dataArray.length) * 2.5;
            let barHeight;
            let x = 0;

            for (let i = 0; i < dataArray.length; i++) {
                barHeight = dataArray[i] / 2;

                visualizerContext.fillStyle = `rgb(${barHeight + 100}, 50, 50)`;
                visualizerContext.fillRect(x, visualizerCanvas.height - barHeight, barWidth, barHeight);

                x += barWidth + 1;
            }
        }

        const queue = new BlockingQueue();

        // Khởi động tiến trình bộ đệm
        async function startAudioBuffering() {
            log("Bắt đầu đệm âm thanh...", 'info');

            // Trước tiên thử khởi tạo bộ giải mã để sẵn sàng khi phát
            initOpusDecoder().catch(error => {
                log(`Khởi tạo trước bộ giải mã Opus thất bại: ${error.message}`, 'warning');
                // Tiếp tục đệm, chúng ta sẽ thử khởi tạo lại khi phát
            });
            const timeout = 300;
            while (true) {
                // Mỗi lần dữ liệu trống thì đợi ba gói dữ liệu
                const packets = await queue.dequeue(
                    3,                       // tối thiểu 3 gói
                    timeout,                     // tối đa đợi 300 ms
                    (count) => {             // callback bổ sung khi timeout
                        log(`Hết thời gian đệm, số gói đệm hiện tại: ${count}, bắt đầu phát`, 'info');
                    }
                );
                if (packets.length) {
                    log(`Đã đệm ${packets.length} gói âm thanh, bắt đầu phát`, 'info');
                    streamingContext.pushAudioBuffer(packets)
                }
                // Trong 50ms, có bao nhiêu cho bấy nhiêu
                while (true) {
                    const data = await queue.dequeue(99, 50)
                    if (data.length) {
                        streamingContext.pushAudioBuffer(data)
                    } else {
                        break
                    }
                }
            }
        }

        // Phát âm thanh đã được đệm
        async function playBufferedAudio() {
            // Đảm bảo bộ giải mã Opus đã được khởi tạo
            try {
                // Đảm bảo ngữ cảnh âm thanh tồn tại
                audioContext = getAudioContextInstance();

                // Đảm bảo bộ giải mã đã được khởi tạo
                if (!opusDecoder) {
                    log('Khởi tạo bộ giải mã Opus...', 'info');
                    try {
                        opusDecoder = await initOpusDecoder();
                        if (!opusDecoder) {
                            throw new Error('Khởi tạo bộ giải mã thất bại');
                        }
                        log('Khởi tạo bộ giải mã Opus thành công', 'success');
                    } catch (error) {
                        log('Khởi tạo bộ giải mã Opus thất bại: ' + error.message, 'error');
                        isAudioPlaying = false;
                        return;
                    }
                }

                // Tạo ngữ cảnh phát luồng
                if (!streamingContext) {
                    streamingContext = createStreamingContext(opusDecoder, audioContext, SAMPLE_RATE, CHANNELS, MIN_AUDIO_DURATION);
                }

                streamingContext.decodeOpusFrames();
                streamingContext.startPlaying();

            } catch (error) {
                log(`Phát âm thanh đã đệm gặp lỗi: ${error.message}`, 'error');
                isAudioPlaying = false;
                streamingContext = null;
            }
        }



        // Khởi tạo bộ giải mã Opus - đảm bảo hoàn thành khởi tạo hoàn toàn trước khi trả về
        async function initOpusDecoder() {
            if (opusDecoder) return opusDecoder; // Đã khởi tạo

            try {
                // Kiểm tra xem ModuleInstance có tồn tại không
                if (typeof window.ModuleInstance === 'undefined') {
                    if (typeof Module !== 'undefined') {
                        // Sử dụng Module toàn cục làm ModuleInstance
                        window.ModuleInstance = Module;
                        log('Sử dụng Module toàn cục làm ModuleInstance', 'info');
                    } else {
                        throw new Error('Thư viện Opus chưa được tải, cả ModuleInstance và đối tượng Module đều không tồn tại');
                    }
                }

                const mod = window.ModuleInstance;

                // Tạo đối tượng bộ giải mã
                opusDecoder = {
                    channels: CHANNELS,
                    rate: SAMPLE_RATE,
                    frameSize: FRAME_SIZE,
                    module: mod,
                    decoderPtr: null, // Ban đầu là null

                    // Khởi tạo bộ giải mã
                    init: function () {
                        if (this.decoderPtr) return true; // Đã khởi tạo

                        // Lấy kích thước bộ giải mã
                        const decoderSize = mod._opus_decoder_get_size(this.channels);
                        log(`Kích thước bộ giải mã Opus: ${decoderSize} byte`, 'debug');

                        // Phân bổ bộ nhớ
                        this.decoderPtr = mod._malloc(decoderSize);
                        if (!this.decoderPtr) {
                            throw new Error("Không thể phân bổ bộ nhớ cho bộ giải mã");
                        }

                        // Khởi tạo bộ giải mã
                        const err = mod._opus_decoder_init(
                            this.decoderPtr,
                            this.rate,
                            this.channels
                        );

                        if (err < 0) {
                            this.destroy(); // Dọn dẹp tài nguyên
                            throw new Error(`Khởi tạo bộ giải mã Opus thất bại: ${err}`);
                        }

                        log("Khởi tạo bộ giải mã Opus thành công", 'success');
                        return true;
                    },

                    // Phương thức giải mã
                    decode: function (opusData) {
                        if (!this.decoderPtr) {
                            if (!this.init()) {
                                throw new Error("Bộ giải mã chưa được khởi tạo và không thể khởi tạo");
                            }
                        }

                        try {
                            const mod = this.module;

                            // Phân bổ bộ nhớ cho dữ liệu Opus
                            const opusPtr = mod._malloc(opusData.length);
                            mod.HEAPU8.set(opusData, opusPtr);

                            // Phân bổ bộ nhớ cho đầu ra PCM
                            const pcmPtr = mod._malloc(this.frameSize * 2); // Int16 = 2 byte

                            // Giải mã
                            const decodedSamples = mod._opus_decode(
                                this.decoderPtr,
                                opusPtr,
                                opusData.length,
                                pcmPtr,
                                this.frameSize,
                                0 // Không sử dụng FEC
                            );

                            if (decodedSamples < 0) {
                                mod._free(opusPtr);
                                mod._free(pcmPtr);
                                throw new Error(`Giải mã Opus thất bại: ${decodedSamples}`);
                            }

                            // Sao chép dữ liệu đã giải mã
                            const decodedData = new Int16Array(decodedSamples);
                            for (let i = 0; i < decodedSamples; i++) {
                                decodedData[i] = mod.HEAP16[(pcmPtr >> 1) + i];
                            }

                            // Giải phóng bộ nhớ
                            mod._free(opusPtr);
                            mod._free(pcmPtr);

                            return decodedData;
                        } catch (error) {
                            log(`Lỗi giải mã Opus: ${error.message}`, 'error');
                            return new Int16Array(0);
                        }
                    },

                    // Phương thức hủy
                    destroy: function () {
                        if (this.decoderPtr) {
                            this.module._free(this.decoderPtr);
                            this.decoderPtr = null;
                        }
                    }
                };

                // Khởi tạo bộ giải mã
                if (!opusDecoder.init()) {
                    throw new Error("Khởi tạo bộ giải mã Opus thất bại");
                }

                return opusDecoder;

            } catch (error) {
                log(`Khởi tạo bộ giải mã Opus thất bại: ${error.message}`, 'error');
                opusDecoder = null; // Đặt lại thành null để thử lại lần sau
                throw error;
            }
        }

        // Khởi tạo ghi âm và xử lý âm thanh
        async function initAudio() {
            try {
                // Yêu cầu quyền truy cập microphone
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        sampleRate: 16000,  // Đảm bảo tỷ lệ lấy mẫu 16kHz
                        channelCount: 1     // Đảm bảo mono
                    }
                });
                log('Đã có quyền truy cập microphone', 'success');

                // Tạo ngữ cảnh âm thanh
                audioContext = getAudioContextInstance();
                const source = audioContext.createMediaStreamSource(stream);

                // Lấy cài đặt track âm thanh thực tế
                const audioTracks = stream.getAudioTracks();
                if (audioTracks.length > 0) {
                    const track = audioTracks[0];
                    const settings = track.getSettings();
                    log(`Cài đặt microphone thực tế - Tỷ lệ lấy mẫu: ${settings.sampleRate || 'Không rõ'}Hz, Số kênh: ${settings.channelCount || 'Không rõ'}`, 'info');
                }

                // Tạo bộ phân tích để hiển thị trực quan
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);

                // Thử khởi tạo MediaRecorder, thử các tùy chọn mã hóa theo độ ưu tiên
                try {
                    // Ưu tiên thử sử dụng mã hóa Opus
                    mediaRecorder = new MediaRecorder(stream, {
                        mimeType: 'audio/webm;codecs=opus',
                        audioBitsPerSecond: 16000
                    });
                    log('Đã khởi tạo MediaRecorder (sử dụng mã hóa Opus)', 'success');
                    log(`Định dạng mã hóa được chọn: ${mediaRecorder.mimeType}`, 'info');
                } catch (e1) {
                    try {
                        // Nếu Opus không được hỗ trợ, thử MP3
                        mediaRecorder = new MediaRecorder(stream, {
                            mimeType: 'audio/webm',
                            audioBitsPerSecond: 16000
                        });
                        log('Đã khởi tạo MediaRecorder (sử dụng mã hóa chuẩn WebM, Opus không được hỗ trợ)', 'warning');
                        log(`Định dạng mã hóa được chọn: ${mediaRecorder.mimeType}`, 'info');
                    } catch (e2) {
                        try {
                            // Thử các định dạng thay thế khác
                            mediaRecorder = new MediaRecorder(stream, {
                                mimeType: 'audio/ogg;codecs=opus',
                                audioBitsPerSecond: 16000
                            });
                            log('Đã khởi tạo MediaRecorder (sử dụng mã hóa OGG+Opus)', 'warning');
                            log(`Định dạng mã hóa được chọn: ${mediaRecorder.mimeType}`, 'info');
                        } catch (e3) {
                            // Cuối cùng sử dụng mã hóa mặc định
                            mediaRecorder = new MediaRecorder(stream);
                            log(`Đã khởi tạo MediaRecorder (sử dụng mã hóa mặc định: ${mediaRecorder.mimeType})`, 'warning');
                        }
                    }
                }

                // Xử lý dữ liệu ghi âm
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                // Xử lý dữ liệu sau khi kết thúc ghi âm
                mediaRecorder.onstop = async () => {
                    // Dừng hiển thị trực quan
                    if (visualizationRequest) {
                        cancelAnimationFrame(visualizationRequest);
                        visualizationRequest = null;
                    }

                    log(`Ghi âm kết thúc, số khối âm thanh đã thu thập: ${audioChunks.length}`, 'info');
                    if (audioChunks.length === 0) {
                        log('Cảnh báo: Không thu thập được dữ liệu âm thanh nào, vui lòng kiểm tra xem microphone có hoạt động bình thường không', 'error');
                        return;
                    }

                    // Tạo blob ghi âm hoàn chỉnh
                    const blob = new Blob(audioChunks, { type: audioChunks[0].type });
                    log(`Đã tạo Audio Blob, loại MIME: ${audioChunks[0].type}, kích thước: ${(blob.size / 1024).toFixed(2)} KB`, 'info');

                    // Lưu khối gốc, phòng khi cần debug sau khi xóa
                    const chunks = [...audioChunks];
                    audioChunks = [];

                    try {
                        // Chuyển đổi blob thành ArrayBuffer
                        const arrayBuffer = await blob.arrayBuffer();
                        const uint8Array = new Uint8Array(arrayBuffer);

                        log(`Đã chuyển đổi thành Uint8Array, chuẩn bị gửi, kích thước: ${(arrayBuffer.byteLength / 1024).toFixed(2)} KB`, 'info');

                        // Kiểm tra trạng thái WebSocket
                        if (!websocket) {
                            log('Lỗi: Kết nối WebSocket không tồn tại', 'error');
                            return;
                        }

                        if (websocket.readyState !== WebSocket.OPEN) {
                            log(`Lỗi: Kết nối WebSocket chưa mở, trạng thái hiện tại: ${websocket.readyState}`, 'error');
                            return;
                        }

                        // Gửi trực tiếp dữ liệu âm thanh nhị phân - đây là cách đơn giản hiệu quả nhất
                        try {
                            // Lưu ý: Tin nhắn bắt đầu và kết thúc đã được gửi khi bắt đầu và kết thúc ghi âm
                            // Ở đây chỉ cần gửi dữ liệu âm thanh
                            await new Promise(resolve => setTimeout(resolve, 50));

                            // Xử lý định dạng container WebM, trích xuất dữ liệu Opus thuần
                            // Máy chủ sử dụng opuslib_next.Decoder, cần khung Opus thuần
                            log('Đang xử lý dữ liệu âm thanh, trích xuất khung Opus thuần...', 'info');
                            const opusData = extractOpusFrames(uint8Array);

                            // Ghi lại kích thước dữ liệu Opus
                            log(`Đã trích xuất dữ liệu Opus, kích thước: ${(opusData.byteLength / 1024).toFixed(2)} KB`, 'info');

                            // Gửi bước thứ hai tin nhắn âm thanh: dữ liệu âm thanh nhị phân
                            websocket.send(opusData);
                            log(`Đã gửi dữ liệu âm thanh Opus: ${(opusData.byteLength / 1024).toFixed(2)} KB`, 'success');
                        } catch (error) {
                            log(`Gửi dữ liệu âm thanh thất bại: ${error.message}`, 'error');

                            // Thử sử dụng mã hóa base64 làm phương án thay thế
                            try {
                                log('Thử sử dụng cách gửi mã hóa base64...', 'info');
                                const base64Data = arrayBufferToBase64(arrayBuffer);
                                const audioDataMessage = {
                                    type: 'audio',
                                    action: 'data',
                                    format: 'opus',
                                    sample_rate: 16000,
                                    channels: 1,
                                    mime_type: chunks[0].type,
                                    encoding: 'base64',
                                    data: base64Data
                                };
                                websocket.send(JSON.stringify(audioDataMessage));
                                log(`Đã sử dụng mã hóa base64 gửi dữ liệu âm thanh: ${(arrayBuffer.byteLength / 1024).toFixed(2)} KB`, 'warning');
                            } catch (base64Error) {
                                log(`Tất cả cách gửi dữ liệu đều thất bại: ${base64Error.message}`, 'error');
                            }
                        }
                    } catch (error) {
                        log(`Lỗi xử lý dữ liệu ghi âm: ${error.message}`, 'error');
                    }
                };

                // Thử khởi tạo bộ giải mã Opus
                try {
                    // Kiểm tra xem ModuleInstance có tồn tại không (biến toàn cục được xuất từ thư viện cục bộ)
                    if (typeof window.ModuleInstance === 'undefined') {
                        throw new Error('Thư viện Opus chưa được tải, đối tượng ModuleInstance không tồn tại');
                    }

                    // Kiểm tra đơn giản xem ModuleInstance có khả dụng không
                    if (typeof window.ModuleInstance._opus_decoder_get_size === 'function') {
                        const testSize = window.ModuleInstance._opus_decoder_get_size(1);
                        log(`Kiểm tra bộ giải mã Opus thành công, kích thước bộ giải mã: ${testSize} byte`, 'success');
                    } else {
                        throw new Error('Không tìm thấy hàm giải mã Opus');
                    }
                } catch (err) {
                    log(`Cảnh báo khởi tạo bộ giải mã Opus: ${err.message}, sẽ thử lại khi cần thiết`, 'warning');
                }

                log('Hoàn thành khởi tạo hệ thống âm thanh', 'success');
                return true;
            } catch (error) {
                log(`Lỗi khởi tạo âm thanh: ${error.message}`, 'error');
                return false;
            }
        }

        // Kết nối máy chủ WebSocket
        async function connectToServer() {
            const url = serverUrlInput.value.trim();
            const config = getConfig();
            // Trước tiên kiểm tra trạng thái OTA
            log('Đang kiểm tra trạng thái OTA...', 'info');
            const otaUrl = document.getElementById('otaUrl').value.trim();
            localStorage.setItem('otaUrl', otaUrl);
            localStorage.setItem('wsUrl', url);

            try {
                const ws = await webSocketConnect(otaUrl, config)
                if (ws === undefined) {
                    return
                }
                websocket = ws

                // 设置接收二进制数据的类型为ArrayBuffer
                websocket.binaryType = 'arraybuffer';

                websocket.onopen = async () => {
                    log(`已连接到服务器: ${url}`, 'success');
                    connectionStatus.textContent = 'ws已连接';
                    connectionStatus.style.color = 'green';

                    // 连接成功后发送hello消息
                    await sendHelloMessage();

                    connectButton.textContent = '断开';
                    connectButton.removeEventListener('click', connectToServer);
                    connectButton.addEventListener('click', disconnectFromServer);
                    // connectButton.onclick = disconnectFromServer;
                    messageInput.disabled = false;
                    sendTextButton.disabled = false;

                    const audioInitialized = await initAudio();
                    if (audioInitialized) {
                        recordButton.disabled = false;
                    }
                };

                websocket.onclose = () => {
                    log('已断开连接', 'info');
                    connectionStatus.textContent = 'ws已断开';
                    connectionStatus.style.color = 'red';

                    connectButton.textContent = '连接';
                    connectButton.removeEventListener('click', disconnectFromServer);
                    connectButton.addEventListener('click', connectToServer);
                    // connectButton.onclick = connectToServer;
                    messageInput.disabled = true;
                    sendTextButton.disabled = true;
                    recordButton.disabled = true;
                    // stopButton.disabled = true;
                };

                websocket.onerror = (error) => {
                    log(`WebSocket错误: ${error.message || '未知错误'}`, 'error');
                    connectionStatus.textContent = 'ws未连接';
                    connectionStatus.style.color = 'red';
                };

                websocket.onmessage = function (event) {
                    try {
                        // 检查是否为文本消息
                        if (typeof event.data === 'string') {
                            const message = JSON.parse(event.data);

                            if (message.type === 'hello') {
                                log(`服务器回应：${JSON.stringify(message, null, 2)}`, 'success');
                            } else if (message.type === 'tts') {
                                // TTS状态消息
                                if (message.state === 'start') {
                                    log('服务器开始发送语音', 'info');
                                } else if (message.state === 'sentence_start') {
                                    log(`服务器发送语音段: ${message.text}`, 'info');
                                    // 添加文本到会话记录
                                    if (message.text) {
                                        addMessage(message.text);
                                    }
                                } else if (message.state === 'sentence_end') {
                                    log(`语音段结束: ${message.text}`, 'info');
                                } else if (message.state === 'stop') {
                                    log('服务器语音传输结束', 'info');

                                    if (recordButton.disabled) {
                                        recordButton.disabled = false;

                            } else if (message.type === 'audio') {
                                // 音频控制消息

        // 发送hello握手消息
        async function sendHelloMessage() {
            if (!websocket || websocket.readyState !== WebSocket.OPEN) return;

            try {
                const config = getConfig();

                // 设置设备信息
                const helloMessage = {
                    type: 'hello',
                    device_id: config.deviceId,
                    device_name: config.deviceName,
                    device_mac: config.deviceMac,
                    token: config.token,
                    features: {
                        mcp: true
                    }
                };

                log('发送hello握手消息', 'info');
                websocket.send(JSON.stringify(helloMessage));

                // 等待服务器响应
                return new Promise(resolve => {
                    // 5秒超时
                    const timeout = setTimeout(() => {
                        log('等待hello响应超时', 'error');
                        log('提示: 请尝试点击"测试认证"按钮进行连接排查', 'info');
                        resolve(false);
                    }, 5000);

                    // 临时监听一次消息，接收hello响应
                    const onMessageHandler = (event) => {
                        try {
                            const response = JSON.parse(event.data);
                            if (response.type === 'hello' && response.session_id) {
                                log(`服务器握手成功，会话ID: ${response.session_id}`, 'success');
                                clearTimeout(timeout);
                                websocket.removeEventListener('message', onMessageHandler);
                                resolve(true);
                            }
                        } catch (e) {
                            // 忽略非JSON消息
                        }
                    };

                    websocket.addEventListener('message', onMessageHandler);
                });
            } catch (error) {
                log(`发送hello消息错误: ${error.message}`, 'error');
                return false;
            }
        }

        // 生成随机MAC地址
        function generateRandomMac() {
            const hexDigits = '0123456789ABCDEF';
            let mac = '';
            for (let i = 0; i < 6; i++) {
                if (i > 0) mac += ':';
                for (let j = 0; j < 2; j++) {
                    mac += hexDigits.charAt(Math.floor(Math.random() * 16));
                }
            }
            return mac;
        }

        // 帮助函数：ArrayBuffer转Base64
        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            const len = bytes.byteLength;
            for (let i = 0; i < len; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }

        // PCM录音处理器代码 - 会被注入到AudioWorklet中
        const audioProcessorCode = `
            class AudioRecorderProcessor extends AudioWorkletProcessor {
                constructor() {
                    super();
                    this.buffers = [];
                    this.frameSize = 960; // 60ms @ 16kHz = 960 samples
                    this.buffer = new Int16Array(this.frameSize);
                    this.bufferIndex = 0;
                    this.isRecording = false;

                    // 监听来自主线程的消息
                    this.port.onmessage = (event) => {
                        if (event.data.command === 'start') {
                            this.isRecording = true;
                            this.port.postMessage({ type: 'status', status: 'started' });
                        } else if (event.data.command === 'stop') {
                            this.isRecording = false;

                            // 发送剩余的缓冲区
                            if (this.bufferIndex > 0) {
                                const finalBuffer = this.buffer.slice(0, this.bufferIndex);
                                this.port.postMessage({
                                    type: 'buffer',
                                    buffer: finalBuffer
                                });
                                this.bufferIndex = 0;
                            }

                            this.port.postMessage({ type: 'status', status: 'stopped' });
                        }
                    };
                }

                process(inputs, outputs, parameters) {
                    if (!this.isRecording) return true;

                    const input = inputs[0][0]; // 获取第一个输入通道
                    if (!input) return true;

                    // 将浮点采样转换为16位整数并存储
                    for (let i = 0; i < input.length; i++) {
                        if (this.bufferIndex >= this.frameSize) {
                            // 缓冲区已满，发送给主线程并重置
                            this.port.postMessage({
                                type: 'buffer',
                                buffer: this.buffer.slice(0)
                            });
                            this.bufferIndex = 0;
                        }

                        // 转换为16位整数 (-32768到32767)
                        this.buffer[this.bufferIndex++] = Math.max(-32768, Math.min(32767, Math.floor(input[i] * 32767)));
                    }

                    return true;
                }
            }

            registerProcessor('audio-recorder-processor', AudioRecorderProcessor);
        `;

        // 创建音频处理器
        async function createAudioProcessor() {
            audioContext = getAudioContextInstance();

            try {
                // 检查是否支持AudioWorklet
                if (audioContext.audioWorklet) {
                    // 注册音频处理器
                    const blob = new Blob([audioProcessorCode], { type: 'application/javascript' });
                    const url = URL.createObjectURL(blob);
                    await audioContext.audioWorklet.addModule(url);
                    URL.revokeObjectURL(url);

                    // 创建音频处理节点
                    const audioProcessor = new AudioWorkletNode(audioContext, 'audio-recorder-processor');

                    // 设置音频处理消息处理
                    audioProcessor.port.onmessage = (event) => {
                        if (event.data.type === 'buffer') {
                            // 收到PCM缓冲区数据
                            processPCMBuffer(event.data.buffer);
                        }
                    };

                    log('使用AudioWorklet处理音频', 'success');
                    return { node: audioProcessor, type: 'worklet' };
                } else {
                    // 使用旧版ScriptProcessorNode作为回退方案
                    log('AudioWorklet不可用，使用ScriptProcessorNode作为回退方案', 'warning');

                    const frameSize = 4096; // ScriptProcessorNode缓冲区大小
                    const scriptProcessor = audioContext.createScriptProcessor(frameSize, 1, 1);

                    // 将audioProcess事件设置为处理音频数据
                    scriptProcessor.onaudioprocess = (event) => {
                        if (!isRecording) return;

                        const input = event.inputBuffer.getChannelData(0);
                        const buffer = new Int16Array(input.length);

                        // 将浮点数据转换为16位整数
                        for (let i = 0; i < input.length; i++) {
                            buffer[i] = Math.max(-32768, Math.min(32767, Math.floor(input[i] * 32767)));
                        }

                        // 处理PCM数据
                        processPCMBuffer(buffer);
                    };

                    // 需要连接输出，否则不会触发处理
                    // 我们创建一个静音通道
                    const silent = audioContext.createGain();
                    silent.gain.value = 0;
                    scriptProcessor.connect(silent);
                    silent.connect(audioContext.destination);

                    return { node: scriptProcessor, type: 'processor' };
                }
            } catch (error) {
                log(`创建音频处理器失败: ${error.message}，尝试回退方案`, 'error');

                // 最后回退方案：使用ScriptProcessorNode
                try {
                    const frameSize = 4096; // ScriptProcessorNode缓冲区大小
                    const scriptProcessor = audioContext.createScriptProcessor(frameSize, 1, 1);

                    scriptProcessor.onaudioprocess = (event) => {
                        if (!isRecording) return;

                        const input = event.inputBuffer.getChannelData(0);
                        const buffer = new Int16Array(input.length);

                        for (let i = 0; i < input.length; i++) {
                            buffer[i] = Math.max(-32768, Math.min(32767, Math.floor(input[i] * 32767)));
                        }

                        processPCMBuffer(buffer);
                    };

                    const silent = audioContext.createGain();
                    silent.gain.value = 0;
                    scriptProcessor.connect(silent);
                    silent.connect(audioContext.destination);

                    log('使用ScriptProcessorNode作为回退方案成功', 'warning');
                    return { node: scriptProcessor, type: 'processor' };
                } catch (fallbackError) {
                    log(`回退方案也失败: ${fallbackError.message}`, 'error');
                    return null;
                }
            }
        }

        // 初始化直接从PCM数据录音的系统
        let audioProcessor = null;
        let audioProcessorType = null;
        let audioSource = null;

        // 处理PCM缓冲数据
        let pcmDataBuffer = new Int16Array();

        function processPCMBuffer(buffer) {
            if (!isRecording) return;

            // 将新的PCM数据追加到缓冲区
            const newBuffer = new Int16Array(pcmDataBuffer.length + buffer.length);
            newBuffer.set(pcmDataBuffer);
            newBuffer.set(buffer, pcmDataBuffer.length);
            pcmDataBuffer = newBuffer;

            // 检查是否有足够的数据进行Opus编码（16000Hz, 60ms = 960个采样点）
            const samplesPerFrame = 960; // 60ms @ 16kHz

            while (pcmDataBuffer.length >= samplesPerFrame) {
                // 从缓冲区取出一帧数据
                const frameData = pcmDataBuffer.slice(0, samplesPerFrame);
                pcmDataBuffer = pcmDataBuffer.slice(samplesPerFrame);

                // 编码为Opus
                encodeAndSendOpus(frameData);
            }
        }

        // 编码并发送Opus数据
        function encodeAndSendOpus(pcmData = null) {
            if (!opusEncoder) {
                log('Opus编码器未初始化', 'error');
                return;
            }

            try {
                // 如果提供了PCM数据，则编码该数据
                if (pcmData) {
                    // 使用已初始化的Opus编码器编码
                    const opusData = opusEncoder.encode(pcmData);

                    if (opusData && opusData.length > 0) {
                        // 存储音频帧
                        audioBuffers.push(opusData.buffer);
                        totalAudioSize += opusData.length;

                        // 如果WebSocket已连接，则发送数据
                        if (websocket && websocket.readyState === WebSocket.OPEN) {
                            try {
                                // 服务端期望接收原始Opus数据，不需要任何额外包装
                                websocket.send(opusData.buffer);
                                log(`发送Opus帧，大小：${opusData.length}字节`, 'debug');
                            } catch (error) {
                                log(`WebSocket发送错误: ${error.message}`, 'error');
                            }
                        }
                    } else {
                        log('Opus编码失败，无有效数据返回', 'error');
                    }
                } else {
                    // 处理剩余的PCM数据
                    if (pcmDataBuffer.length > 0) {
                        // 如果剩余的采样点不足一帧，用静音填充
                        const samplesPerFrame = 960;
                        if (pcmDataBuffer.length < samplesPerFrame) {
                            const paddedBuffer = new Int16Array(samplesPerFrame);
                            paddedBuffer.set(pcmDataBuffer);
                            // 剩余部分为0（静音）
                            encodeAndSendOpus(paddedBuffer);
                        } else {
                            encodeAndSendOpus(pcmDataBuffer.slice(0, samplesPerFrame));
                        }
                        pcmDataBuffer = new Int16Array(0);
                    }
                }
            } catch (error) {
                log(`Opus编码错误: ${error.message}`, 'error');
            }
        }

        // 开始直接从PCM数据录音
        async function startDirectRecording() {
            if (isRecording) return;

            try {
                // 初始化Opus编码器
                if (!initOpusEncoder()) {
                    log('无法启动录音: Opus编码器初始化失败', 'error');
                    return;
                }

                // 请求麦克风权限
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        sampleRate: 16000,
                        channelCount: 1
                    }
                });

                // 创建音频上下文和分析器
                audioContext = getAudioContextInstance();

                // 创建音频处理器
                const processorResult = await createAudioProcessor();
                if (!processorResult) {
                    log('无法创建音频处理器', 'error');
                    return;
                }

                audioProcessor = processorResult.node;
                audioProcessorType = processorResult.type;

                // 连接音频处理链
                audioSource = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;

                audioSource.connect(analyser);
                audioSource.connect(audioProcessor);

                // 启动录音
                pcmDataBuffer = new Int16Array();
                audioBuffers = [];
                totalAudioSize = 0;
                isRecording = true;

                // 启动音频处理器的录音 - 只有AudioWorklet才需要发送消息
                if (audioProcessorType === 'worklet' && audioProcessor.port) {
                    audioProcessor.port.postMessage({ command: 'start' });
                }

                // 发送监听开始消息
                if (websocket && websocket.readyState === WebSocket.OPEN) {
                    // 使用与服务端期望的listen消息格式
                    const listenMessage = {
                        type: 'listen',
                        mode: 'manual',  // 使用手动模式，由我们控制开始/停止
                        state: 'start'   // 表示开始录音
                    };

                    log(`发送录音开始消息: ${JSON.stringify(listenMessage)}`, 'info');
                    websocket.send(JSON.stringify(listenMessage));
                } else {
                    log('WebSocket未连接，无法发送开始消息', 'error');
                    return false;
                }

                // 开始音频可视化
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                drawVisualizer(dataArray);

                // 在UI上显示录音计时器
                let recordingSeconds = 0;
                const recordingTimer = setInterval(() => {
                    recordingSeconds += 0.1;
                    recordButton.textContent = `停止录音 ${recordingSeconds.toFixed(1)}秒`;
                }, 100);

                // 保存计时器，以便在停止时清除
                window.recordingTimer = recordingTimer;

                recordButton.classList.add('recording');
                recordButton.disabled = false;

                log('开始PCM直接录音', 'success');
                return true;
            } catch (error) {
                log(`直接录音启动错误: ${error.message}`, 'error');
                isRecording = false;
                return false;
            }
        }

        // 停止直接从PCM数据录音
        function stopDirectRecording() {
            if (!isRecording) return;

            try {
                // 停止录音
                isRecording = false;

                // 停止音频处理器的录音
                if (audioProcessor) {
                    // 只有AudioWorklet才需要发送停止消息
                    if (audioProcessorType === 'worklet' && audioProcessor.port) {
                        audioProcessor.port.postMessage({ command: 'stop' });
                    }

                    audioProcessor.disconnect();
                    audioProcessor = null;
                }

                // 断开音频连接
                if (audioSource) {
                    audioSource.disconnect();
                    audioSource = null;
                }

                // 停止可视化
                if (visualizationRequest) {
                    cancelAnimationFrame(visualizationRequest);
                    visualizationRequest = null;
                }

                // 清除录音计时器
                if (window.recordingTimer) {
                    clearInterval(window.recordingTimer);
                    window.recordingTimer = null;
                }

                // 编码并发送剩余的数据
                encodeAndSendOpus();

                // 发送一个空的消息作为结束标志（模拟接收到空音频数据的情况）
                if (websocket && websocket.readyState === WebSocket.OPEN) {
                    // 使用空的Uint8Array发送最后一个空帧
                    const emptyOpusFrame = new Uint8Array(0);
                    websocket.send(emptyOpusFrame);

                    // 发送监听结束消息
                    const stopMessage = {
                        type: 'listen',
                        mode: 'manual',
                        state: 'stop'
                    };

                    websocket.send(JSON.stringify(stopMessage));
                    log('已发送录音停止信号', 'info');
                }

                // 重置UI
                recordButton.textContent = '开始录音';
                recordButton.classList.remove('recording');
                recordButton.disabled = false;

                log('停止PCM直接录音', 'success');
                return true;
            } catch (error) {
                log(`直接录音停止错误: ${error.message}`, 'error');
                return false;
            }
        }

        async function handleBinaryMessage(data) {
            try {
                let arrayBuffer;
                // 根据数据类型进行处理
                if (data instanceof ArrayBuffer) {
                    arrayBuffer = data;
                    log(`收到ArrayBuffer音频数据，大小: ${data.byteLength}字节`, 'debug');
                } else if (data instanceof Blob) {
                    // 如果是Blob类型，转换为ArrayBuffer
                    arrayBuffer = await data.arrayBuffer();
                    log(`收到Blob音频数据，大小: ${arrayBuffer.byteLength}字节`, 'debug');
                } else {
                    log(`收到未知类型的二进制数据: ${typeof data}`, 'warning');
                    return;
                }
                // 创建Uint8Array用于处理
                const opusData = new Uint8Array(arrayBuffer);
                if (opusData.length > 0) {
                    // 将数据添加到缓冲队列
                    queue.enqueue(opusData);
                } else {
                    log('收到空音频数据帧，可能是结束标志', 'warning');
                    // 如果正在播放，发送结束信号
                    if (isAudioPlaying && streamingContext) {
                        streamingContext.endOfStream = true;
                    }
                }
            } catch (error) {
                log(`处理二进制消息出错: ${error.message}`, 'error');
            }
        }

        // 获取配置值
        function getConfig() {
            const deviceMac = document.getElementById('deviceMac').value.trim();
            return {
                deviceId: deviceMac,  // 使用MAC地址作为deviceId
                deviceName: document.getElementById('deviceName').value.trim(),
                deviceMac: deviceMac,
                clientId: document.getElementById('clientId').value.trim(),
                token: document.getElementById('token').value.trim()
            };
        }

        initApp();
    </script>
</body>
